services:
  sourcebot:
    image: ghcr.io/sourcebot-dev/sourcebot:v4.0.0
    ports:
      - "3000:3000"
    volumes:
      - ${REPOS_ROOT:-~/projects}:/repos:ro
      # 首次使用: cp config/sourcebot.json.example config/sourcebot.json
      - ./config/sourcebot.json:/data/config.json:ro
      - sourcebot_data:/data
    environment:
      - CONFIG_PATH=/data/config.json
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  chat-ui:
    build: ./chat-ui
    ports:
      - "8501:8501"
    volumes:
      - ${REPOS_ROOT:-~/projects}:/repos:ro
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-codebase}
      - SOURCEBOT_URL=http://sourcebot:3000
      - SOURCEBOT_ORG_DOMAIN=${SOURCEBOT_ORG_DOMAIN:-~}
      - SOURCEBOT_API_KEY=${SOURCEBOT_API_KEY}
      - REPOS_ROOT=/repos
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v4}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-1024}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_MODEL=${LLM_MODEL:-claude-sonnet-4-6}
      - CHAT_USERNAME=${CHAT_USERNAME:-admin}
      - CHAT_PASSWORD=${CHAT_PASSWORD:-admin123}
      - AST_SERVICE_URL=http://ast-service:8502
    depends_on:
      - qdrant
      - sourcebot
      - ast-service
    restart: unless-stopped

  ast-service:
    build: ./ast-service
    ports:
      - "8502:8502"
    volumes:
      - ${REPOS_ROOT:-~/projects}:/repos:ro
      - ast_data:/data
    environment:
      - REPOS_ROOT=/repos
      - AST_DB_PATH=/data/ast.sqlite
    restart: unless-stopped

volumes:
  sourcebot_data:
  qdrant_data:
  ast_data:
